services:
  postgres:
    image: postgres:16-alpine
    container_name: exilium-postgres
    environment:
      POSTGRES_USER: exilium
      POSTGRES_PASSWORD: exilium
      POSTGRES_DB: exilium
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: exilium-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
